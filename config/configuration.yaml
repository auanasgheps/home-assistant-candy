# Minimal dev configuration - loads only what's needed for candy integration
# This avoids Bluetooth, zeroconf, alerts and other components
# that fail or block on macOS outside of a devcontainer.

homeassistant:
  name: "Candy Dev"
  unit_system: metric
  time_zone: Europe/Rome

# HTTP server - explicit port to avoid conflicts
http:
  server_port: 8123

# Logger - keep it focused on candy
logger:
  default: warning
  logs:
    custom_components.candy: debug
    homeassistant.loader: warning

# Disable the default integration bundle (it loads Bluetooth, alerts, etc.)
# default_config:
